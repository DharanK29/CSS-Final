<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website - Home</title>
  <style>
    a.skip { position: absolute; top: -40px; } a.skip:focus { top: 0; }
    nav { display: flex; gap: 20px; background: navy; padding: 10px; }
    nav a { color: white; text-decoration: none; font-size: 18px; }
    nav a:hover { color: yellow; text-decoration: underline; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
    img { border: 3px solid navy; padding: 5px; border-radius: 10px; width: 100%; }
    img:nth-child(even) { border-radius: 50%; }
    img:hover { border-color: orange; transform: scale(1.05); }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to Main Content</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>
  <main id="main">
    <h1>Welcome to My Website</h1>
    <p>This is the home page with a photo grid below.</p>
    <div class="grid">
      <img src="https://github.com/DharanK29/CSS-Final/blob/main/Nature/nature4.jpg" alt="Nature photo 1">
      <img src="https://picsum.photos/seed/b/400/300" alt="Nature photo 2">
      <img src="https://picsum.photos/seed/c/400/300" alt="Nature photo 3">
      <img src="https://picsum.photos/seed/d/400/300" alt="Nature photo 4">
      <img src="https://picsum.photos/seed/e/400/300" alt="Nature photo 5">
    </div>
  </main>
</body>
</html>
