<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website - Contact</title>
  <style>
    a.skip { position: absolute; top: -40px; } a.skip:focus { top: 0; }
    nav { display: flex; gap: 20px; background: navy; padding: 10px; }
    nav a { color: white; text-decoration: none; font-size: 18px; }
    nav a:hover { color: yellow; text-decoration: underline; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
    img { border: 3px solid navy; padding: 5px; border-radius: 10px; width: 100%; }
    img:hover { border-color: orange; transform: scale(1.05); }
    label { display: block; margin-top: 10px; }
    input, textarea { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 12px; padding: 10px 20px; background: navy; color: white; border: none; cursor: pointer; }
    button:hover { background: orange; }
  </style>
</head>
<body>
  <a class="skip" href="#main">Skip to Main Content</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>
  <main id="main">
    <h1>Contact Us</h1>
    <div class="grid">
      <div>
        <label>Name: <input type="text" placeholder="Your name"></label>
        <label>Email: <input type="email" placeholder="Your email"></label>
        <label>Message: <textarea rows="5" placeholder="Your message"></textarea></label>
        <button>Send</button>
      </div>
      <img src="https://picsum.photos/seed/k/500/400" alt="Contact photo">
    </div>
  </main>
</body>
</html>
